<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports · SentinelAI</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2.5l7.5 3v6c0 4.6-3.2 8.3-7.5 9.7-4.3-1.4-7.5-5.1-7.5-9.7v-6l7.5-3z"/>
          <circle cx="12" cy="11.2" r="1.4" fill="white" stroke="none"/>
        </svg>
      </div>
      <div class="brand-name">Sentinel<span>AI</span></div>
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        Dashboard
      </a>
      <a href="threats.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5"/><path d="M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"/></svg>
        Threats
      </a>
      <a href="analyzer.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="6.5"/><line x1="15" y1="15" x2="20" y2="20"/></svg>
        AI Analyzer
      </a>
      <a href="reports.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="20" x2="5" y2="11"/><line x1="12" y1="20" x2="12" y2="6"/><line x1="19" y1="20" x2="19" y2="14"/></svg>
        Reports
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar" data-user-avatar>··</div>
        <div class="user-meta">
          <div class="user-name" data-user-name>Loading…</div>
          <div class="user-role" data-user-role>—</div>
        </div>
        <button class="logout-btn" data-logout aria-label="Log out" title="Log out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="flex items-center gap-md">
        <button class="sidebar-toggle" data-sidebar-toggle aria-label="Toggle menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <div class="topbar-title">Reports</div>
          <div class="topbar-subtitle">Summary statistics for a chosen time range</div>
        </div>
      </div>
      <button class="btn btn-primary btn-sm" id="exportBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export CSV
      </button>
    </header>

    <main class="page-content">

      <div class="report-controls">
        <div class="range-pills" id="rangePills">
          <button class="range-pill" data-range="7d">7 days</button>
          <button class="range-pill active" data-range="30d">30 days</button>
          <button class="range-pill" data-range="90d">90 days</button>
          <button class="range-pill" data-range="all">All time</button>
        </div>
      </div>

      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-top">
            <span class="stat-label">Total threats</span>
          </div>
          <div class="stat-value" id="repTotal">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-top">
            <span class="stat-label">Total AI analyses</span>
          </div>
          <div class="stat-value" id="repAnalyses">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-top">
            <span class="stat-label">Critical severity</span>
          </div>
          <div class="stat-value" id="repCritical">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-top">
            <span class="stat-label">Top source</span>
          </div>
          <div class="stat-value" id="repTopSource" style="font-size:18px;">—</div>
        </div>
      </div>

      <div class="dashboard-grid">
        <div class="card chart-card">
          <div class="card-header">
            <div>
              <div class="card-title">Detections over time</div>
            </div>
          </div>
          <canvas id="repTrendChart" height="110"></canvas>
        </div>
        <div class="card chart-card">
          <div class="card-header">
            <div>
              <div class="card-title">IOC type breakdown</div>
            </div>
          </div>
          <canvas id="repIocChart" height="110"></canvas>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">Threat type breakdown</div>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Threat type</th><th>Count</th><th>Share</th></tr></thead>
            <tbody id="typeBreakdownBody">
              <tr><td colspan="3"><div class="loading-row"><div class="spinner"></div> Loading…</div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<div class="toast-stack"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script src="js/reports.js"></script>
</body>
</html>
